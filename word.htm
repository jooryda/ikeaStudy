<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>IKEA 업무 용어 검색</title>
  <style>
    :root {
      --blue:#0b5cab;
      --blue-dark:#064a8a;
      --bg:#f5f7fa;
      --card:#ffffff;
      --line:#d8e0ea;
      --text:#17202a;
      --muted:#5f6f82;
      --mark:#fff2a8;
      --shadow:0 6px 22px rgba(20,40,70,.08);
      --radius:16px;
    }
    * { box-sizing:border-box; }
    html { -webkit-text-size-adjust:100%; }
    body {
      margin:0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", "Apple SD Gothic Neo", "Noto Sans KR", Arial, sans-serif;
      background:var(--bg);
      color:var(--text);
      line-height:1.55;
    }
    .page { max-width:1200px; margin:0 auto; padding:24px 18px 48px; }
    header { margin-bottom:18px; }
    h1 { font-size:28px; line-height:1.2; margin:0 0 8px; letter-spacing:-.04em; }
    .subtitle { margin:0; color:var(--muted); font-size:14px; }
    .search-panel {
      position:sticky;
      top:0;
      z-index:10;
      background:rgba(245,247,250,.94);
      backdrop-filter: blur(10px);
      padding:14px 0 16px;
      border-bottom:1px solid rgba(216,224,234,.7);
    }
    .search-box {
      display:grid;
      grid-template-columns:minmax(0, 1fr) auto auto;
      gap:8px;
      align-items:center;
    }
    input[type="search"] {
      width:100%;
      min-height:46px;
      padding:0 14px;
      font-size:16px;
      border:1px solid var(--line);
      border-radius:12px;
      outline:none;
      background:#fff;
    }
    input[type="search"]:focus { border-color:var(--blue); box-shadow:0 0 0 3px rgba(11,92,171,.12); }
    button {
      min-height:46px;
      padding:0 16px;
      border:0;
      border-radius:12px;
      font-size:15px;
      font-weight:700;
      cursor:pointer;
      white-space:nowrap;
    }
    .btn-primary { background:var(--blue); color:#fff; }
    .btn-primary:hover { background:var(--blue-dark); }
    .btn-ghost { background:#e9eef5; color:#25364a; }
    .status { margin-top:10px; color:var(--muted); font-size:14px; }
    mark { background:var(--mark); padding:0 .08em; border-radius:3px; }

    .table-wrap {
      margin-top:18px;
      background:var(--card);
      border:1px solid var(--line);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      overflow:hidden;
    }
    table { width:100%; border-collapse:collapse; table-layout:fixed; }
    th {
      background:var(--blue);
      color:#fff;
      font-size:14px;
      text-align:left;
      padding:12px 14px;
      border-right:1px solid rgba(255,255,255,.25);
    }
    th:nth-child(1) { width:16%; }
    th:nth-child(2) { width:36%; }
    th:nth-child(3) { width:48%; }
    td {
      vertical-align:top;
      padding:12px 14px;
      border-top:1px solid var(--line);
      border-right:1px solid var(--line);
      font-size:14px;
      word-break:break-word;
      white-space:pre-line;
    }
    td:last-child, th:last-child { border-right:0; }
    .term { font-weight:800; color:#0a3768; }
    .empty {
      display:none;
      margin-top:18px;
      background:#fff;
      border:1px dashed var(--line);
      border-radius:var(--radius);
      padding:24px;
      text-align:center;
      color:var(--muted);
    }
    .empty.show { display:block; }
    footer { margin-top:18px; color:var(--muted); font-size:12px; }

    @media (max-width: 720px) {
      .page { padding:16px 12px 32px; }
      h1 { font-size:22px; }
      .subtitle { font-size:13px; }
      .search-panel { padding-top:10px; }
      .search-box { grid-template-columns:1fr; }
      button { width:100%; }
      .table-wrap {
        margin-top:14px;
        background:transparent;
        border:0;
        border-radius:0;
        box-shadow:none;
        overflow:visible;
      }
      table, thead, tbody, tr, th, td { display:block; width:100%; }
      thead { display:none; }
      tr {
        background:var(--card);
        border:1px solid var(--line);
        border-radius:16px;
        box-shadow:var(--shadow);
        padding:12px 14px;
        margin-bottom:12px;
      }
      td {
        border:0;
        padding:7px 0;
        font-size:15px;
        white-space:pre-line;
      }
      td::before {
        content:attr(data-label);
        display:block;
        margin-bottom:2px;
        color:var(--muted);
        font-size:12px;
        font-weight:800;
        letter-spacing:-.02em;
      }
      td.term-cell { padding-top:0; }
      td.term-cell .term {
        display:inline-block;
        font-size:22px;
        line-height:1.15;
        color:var(--blue);
      }
      td.meaning-cell {
        margin-top:3px;
        padding-top:9px;
        border-top:1px solid #edf1f5;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <header>
      <h1>IKEA 업무 용어 검색</h1>
      <p class="subtitle">약자, 본래 표현, 의미를 빠르게 검색합니다. 모바일에서는 카드형으로 표시됩니다.</p>
    </header>

    <section class="search-panel" aria-label="검색 영역">
      <form class="search-box" id="searchForm">
        <input id="searchInput" type="search" placeholder="예: AHT, Delivery, 고객지원, 반품" autocomplete="off" aria-label="검색어 입력" />
        <button class="btn-primary" type="submit">검색</button>
        <button class="btn-ghost" type="button" id="resetBtn">전체보기</button>
      </form>
      <div class="status" id="status"></div>
    </section>

    <section class="table-wrap" aria-label="용어 목록">
      <table>
        <thead>
          <tr>
            <th>약자 / 용어</th>
            <th>본래의 표현</th>
            <th>의미</th>
          </tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
    </section>
    <div class="empty" id="empty">검색 결과가 없습니다. 다른 단어로 검색해보세요.</div>
    <footer>Tip. 검색어를 입력한 뒤 Enter 키를 눌러도 검색됩니다.</footer>
  </main>

  <script>
    const glossary = [{"term": "ACI", "expression": "A tool for online payment, used to view transactions in real time, extract reconciliation reports, view statistics and make refunds.", "meaning": "e-Com 오더의 거래내역 또는 돌&환불 진행\nTool for viewing e-Com order transaction history and handling exchanges/refunds."}, {"term": "ACW", "expression": "After Call Work", "meaning": "전화상담 후처리 업무\nPost-call work after a phone consultation."}, {"term": "AHT", "expression": "Average Handling Time", "meaning": "평균 처리 시간\nAverage time required to handle a case/contact."}, {"term": "APP", "expression": "Application", "meaning": "스마트폰의 앱(애플리케이션) - IKEA Store 모바일 앱\nSmartphone application; IKEA Store mobile app."}, {"term": "ASA", "expression": "Average Speed of Answer", "meaning": "평균 응답 속도\nAverage speed at which calls/contacts are answered."}, {"term": "ASR", "expression": "Administration Support Retail", "meaning": ""}, {"term": "ATT", "expression": "Average Talk Time", "meaning": "평균 통화 시간\nAverage time spent talking on a call."}, {"term": "BNO", "expression": "Business Navigation and Operation", "meaning": "스태프 플래닝(스케줄), 예산, 진행 컨트롤, 건물 유지보수, 리커버리팀 등\nStaff planning (schedules), budgets, process/control, building maintenance, Recovery team, etc."}, {"term": "BS", "expression": "Business Service Team", "meaning": "(CSC 부서)\nCSC department."}, {"term": "BU", "expression": "Business Unit", "meaning": "비즈니스 유닛 (Store, CDC, CSC, SO 등과 같은 사업의 큰 단위)\nBusiness unit; a large business unit such as Store, CDC, CSC, SO, etc."}, {"term": "C3WEB", "expression": "Centiro", "meaning": "배송 관련 프로그램 이름 (CSC TSPE에서 주로 사용)\nName of a delivery-related program, mainly used in CSC TSPE."}, {"term": "CCD", "expression": "Central Customer Delivery\n(Delivery Service from Central Warehouse to a customer)", "meaning": "중앙 고객 배송 (CDC를 통해 이루어지는 배송=이커머스 배송)\nCentral customer delivery; delivery from CDC/central warehouse to customer, i.e., e-commerce delivery."}, {"term": "CDA", "expression": "-", "meaning": "전략적 주요 지역\nStrategic key area."}, {"term": "CDC", "expression": "Customer Distribution Centre", "meaning": "중앙 물류창고\nCentral distribution center/warehouse."}, {"term": "CDOS", "expression": "Customer Distribution Order Service", "meaning": "CCD 재고 및 제품 등을 관리하는 부서\nDepartment that manages CCD stock and products."}, {"term": "CDU", "expression": "Customer Distribution Unit", "meaning": "CDC에서 픽킹 되는 단위\nUnit picked at CDC."}, {"term": "ChatPH", "expression": "Chat per Hour", "meaning": "시간당 채팅 처리 수\nNumber of chats handled per hour."}, {"term": "COM&IN", "expression": "Communication and Interior design", "meaning": "디자인팀\nDesign team."}, {"term": "CPH", "expression": "Call Per Hour", "meaning": "시간당 콜 처리 수\nNumber of calls handled per hour."}, {"term": "CPU", "expression": "Central Parcel Unit", "meaning": "택배 제품 유닛\nParcel-product unit."}, {"term": "CR", "expression": "Customer Resolution Team", "meaning": "(CSC 부서)\nCSC department."}, {"term": "CR", "expression": "Customer Relations", "meaning": "고객지원팀\nCustomer Relations / customer support team."}, {"term": "CRM", "expression": "Customer Relations Management", "meaning": "고객관계관리\nCustomer relationship management."}, {"term": "CSC", "expression": "Customer Support Centre", "meaning": "고객지원센터\nCustomer Support Centre."}, {"term": "CWIS", "expression": "Common Warehouse Information Service.\n(New warehouse platform that replaces ViCO)", "meaning": "CDC 운영 관련 시스템\nCDC operations-related system."}, {"term": "CY", "expression": "Calendar Year", "meaning": "달력 상의 1년 (매년 1월~12월)\nCalendar year (January to December)."}, {"term": "Democratic Design", "expression": "Low cost, Design, Quality, and Sustainability", "meaning": "저렴한 비용, 디자인, 품질 및 지속가능성\nLow cost, design, quality and sustainability."}, {"term": "DS", "expression": "Date Stamp", "meaning": "제조 시기\nManufacturing date/production period."}, {"term": "eComm", "expression": "e-Commerce", "meaning": "이커머스 = 전자상거래 = 온라인 몰\nE-commerce; online store."}, {"term": "eIRW", "expression": "enhanced IKEA Retail Website", "meaning": "이커머스 기능이 포함된 IKEA 공식 웹사이트 (접속 주소 등이 똑같아서 코워커는 굳이 IRW와 구분하여 표현하지 않아도 됨)\nIKEA official website with e-commerce functions; co-workers do not usually need to distinguish it from IRW because the access address is the same."}, {"term": "EPH", "expression": "Email Per Hour", "meaning": "시간당 이메일 처리 수\nNumber of emails handled per hour."}, {"term": "ESP", "expression": "External Service Provider (CDC operation)", "meaning": "CDC운영관리\nExternal provider managing CDC operations."}, {"term": "ESS", "expression": "Employee Self Service", "meaning": "급여 조회 사이트\nEmployee self-service site for payroll lookup."}, {"term": "EVEX", "expression": "Even Exchange", "meaning": "Home Delivery, 또는 기타 사유에 의해서 배송되었던 상품에 하자, 오류가 있었을 경우 Self-serve에서 picking 하여 Home-Delivery에 넘겨주는 업무로서 해당 case가 발생시 RDT에서 EVEX리스트를 확인하고, Picking 상품을 스캔 후 Hand-over하면 된다.\nEven exchange process for items delivered by Home Delivery or for other reasons when a defect/error exists; pick in Self-serve, hand over to Home Delivery. Check the EVEX list in RDT, scan picked items, then hand over."}, {"term": "FCR", "expression": "First Call Resolution", "meaning": "첫 번째 전화연결에서 해결\nResolving the issue on the first call."}, {"term": "First 5", "expression": "First 5 Room setting", "meaning": "IKEA의 Business Plan과 Priority를 상징적으로 나타낸다. 그 중 1개의 Room은 complete price를 가지는 형태이며 (주로) 해당 국가의 co-worker salary수준의 가격대로 구성하는 것이 일반적이다.\nSymbolically shows IKEA’s Business Plan and priorities. One room usually has a complete price and is typically set at a price level aligned with co-worker salary levels in that country."}, {"term": "FS", "expression": "Full Serve", "meaning": "풀서브\nFull serve."}, {"term": "FSHO", "expression": "Full Serve Handout", "meaning": "풀서브핸드아웃\nFull Serve Handout."}, {"term": "FY", "expression": "Financial Year (Fiscal Year)", "meaning": "회계 년도 (매년 9월 1일 ~ 차년도 8월 31일)\nFiscal year (Sept. 1 to Aug. 31 of the following year)."}, {"term": "FYA", "expression": "For Your Action", "meaning": "당신의 행동을 위해\nFor your action; action required from you."}, {"term": "FYI", "expression": "For Your Information", "meaning": "당신의 정보를 위해\nFor your information."}, {"term": "FYR", "expression": "For Your Reference", "meaning": "참고하세요\nFor your reference."}, {"term": "Go-With", "expression": "Go-With", "meaning": "노사협의회 명칭 (gowith.kr@ikea.com)\nName of the labor-management council."}, {"term": "GWI", "expression": "Growth with impact", "meaning": "IKEA의 해당 회계년도 주요 사업목표 (중점 사업분야)\nIKEA’s main business goal/focus area for the fiscal year."}, {"term": "Hassle free", "expression": "Hassle free", "meaning": "번거로움이 없는 단순한 과정 (단순 교환환불 정책과 절차)\nSimple, hassle-free process; simple exchange/refund policy and procedure."}, {"term": "HD", "expression": "Home Delivery", "meaning": "홈딜리버리\nHome delivery."}, {"term": "HR", "expression": "Human Resource", "meaning": "인사팀\nHuman Resources."}, {"term": "HUTI", "expression": "Help Us To Improve", "meaning": "고객만족도 조사 시스템 (매장 설치, 고객이 의견을 남길 수 있는 키오스크 기기)\nCustomer satisfaction survey system; in-store kiosk where customers can leave feedback."}, {"term": "ico-worker", "expression": "ico-worker (아이코워커)", "meaning": "이케아 내/외부 모두에서 접속 가능한 코워커 지원 도구\nCo-worker support tool accessible both inside and outside IKEA."}, {"term": "ICSS", "expression": "IKEA Customer Satisfaction Survey", "meaning": "고객만족도 조사\nCustomer satisfaction survey."}, {"term": "IF", "expression": "IKEA FOOD", "meaning": "푸드팀\nIKEA Food team."}, {"term": "ININ", "expression": "Interaction Desktop (program)", "meaning": "Interaction Desktop 프로그램의 회사 (Interactive Intelligence)\n※ CSC에서 습관적으로 Interaction Desktop 프로그램 자체를 지칭함\nCompany behind Interaction Desktop (Interactive Intelligence); in CSC it commonly refers to the Interaction Desktop program itself."}, {"term": "IoS", "expression": "IKEA of Sweden", "meaning": "스웨덴 본사\nIKEA of Sweden / headquarters in Sweden."}, {"term": "IRW", "expression": "IKEA Retail Website", "meaning": "IKEA의 공식 웹사이트\nIKEA official website."}, {"term": "ISELL", "expression": "(The sales and service application)", "meaning": "상품 및 서비스 판매 프로그램\nSales and service application for selling products and services."}, {"term": "ISOM", "expression": "IKEA Sales Order Management", "meaning": "CDC에서 CCD오더가 진행될 수 있도록 운영하는 시스템\nSystem used to manage/operate CCD orders so they can be processed at CDC."}, {"term": "IVR", "expression": "Interactive Voice Response", "meaning": "대화식 음성 응답\nInteractive voice response."}, {"term": "KMI", "expression": "Knowledge Management & Insights Team", "meaning": "(CSC 부서)\nCSC department."}, {"term": "KMS", "expression": "Knowledge Management System", "meaning": "CSC 관련 업무 지식을 모아놓은 웹사이트\nWebsite that gathers CSC-related work knowledge."}, {"term": "KPIs", "expression": "Key Performance Indicator", "meaning": "핵심 성과 지표 (업무 목표)\n→ KPIs 설정 시 중점 요인은 'SMART'를 검색해보세요.\nKey performance indicators (work goals). When setting KPIs, search “SMART” for key criteria."}, {"term": "KRONOS", "expression": "KRONOS (크로노스)", "meaning": "근무 계획 및 출퇴근 시간을 기록할 수 있는 타임키핑 시스템\nTimekeeping system for work schedules and clock-in/clock-out records."}, {"term": "LCD", "expression": "Local Customer Delivery", "meaning": "지역별 고객 배송\nLocal customer delivery by region."}, {"term": "LMC", "expression": "LABOR MANAGEMENT COUNCIL", "meaning": "노사협의회\nLabor-management council."}, {"term": "LSC", "expression": "Local Service Centre\n(Hub - usually TSP warehouse)", "meaning": "운송사 허브\nTransport provider hub, usually a TSP warehouse."}, {"term": "LWC", "expression": "Living with children", "meaning": "아이들과 함께 생활하기\nLiving with children."}, {"term": "MCM", "expression": "Multi channel Customer(Contact) Management system", "meaning": "다중 채널 고객/연락 관리 시스템\nMulti-channel customer/contact management system."}, {"term": "MCTP", "expression": "Multichannel", "meaning": "이커머스를 포함한 멀티채널\nMultichannel including e-commerce."}, {"term": "MHS", "expression": "Merchandise Handling System", "meaning": "물류시스템\nMerchandise handling / logistics system."}, {"term": "MR", "expression": "Market relevance", "meaning": "시장 관련성\nMarket relevance."}, {"term": "N/A", "expression": "Non Available", "meaning": "사용 불가 (엑셀 등에서 사용되는 표현)\nNot available; expression used in Excel, etc."}, {"term": "NLP", "expression": "New Lower Price", "meaning": "더 낮아진 새로운 가격\nNew lower price."}, {"term": "NPS", "expression": "Net Promoter Score (Customer satisfaction survey)", "meaning": "순 추천고객 지수 (고객 로열티를 측정하는 방법) => 고객 만족도 조사\nNet Promoter Score; measure of customer loyalty, used as a customer satisfaction survey."}, {"term": "NVAC", "expression": "Non Value Adding Contacts", "meaning": "손님이 스스로 정보를 찾을 수 있어 CSC로 인입되지 않아도 되는 콜\nNon-value-adding contacts: calls customers could avoid by finding information themselves, without contacting CSC."}, {"term": "OPS", "expression": "Operations Team", "meaning": "(CSC 부서) 오퍼레이션팀-옵스팀\nOperations team / Ops team (CSC department)."}, {"term": "OYL", "expression": "Organize your living", "meaning": "생활 정리하기\nOrganize your living."}, {"term": "P&D", "expression": "Performance and Development", "meaning": "업무 성과 및 개발\nPerformance and development."}, {"term": "PDOC", "expression": "(Product information database - Specification, Drawing, Label, Package Request etc.)", "meaning": "PIA Facts보다 더 자세한 제품정보를 확인할 수 있는 사이트 (도면 등)\nProduct information database; site for more detailed product information than PIA Facts, including drawings."}, {"term": "PIA Facts", "expression": "Product Information Assistance\n(Product basic information database)", "meaning": "IRW(IKEA 웹사이트)보다 조금 더 자세한 제품정보를 확인할 수 있는 사이트\nProduct basic information database; site with slightly more detailed product information than IRW/IKEA website."}, {"term": "PIP", "expression": "Product Information Page", "meaning": "IKEA의 공식 웹사이트의 제품 정보 페이지\nProduct information page on IKEA’s official website."}, {"term": "PMA", "expression": "Primary Market Area", "meaning": "1차 시장 지역\nPrimary market area."}, {"term": "PON", "expression": "Parts Out from New", "meaning": "새 상품에서 부품/파트를 발췌하여 발송 시의 업무 흐름(WF)\nWorkflow for taking parts from a new product and sending them."}, {"term": "POS", "expression": "Point of Sales", "meaning": "계산대 (판매시점 정보관리시스템)\nPoint of Sale; checkout / sales-point information management system."}, {"term": "P-Tag", "expression": "Price Tag", "meaning": "제품에 부착된 가격, 규격, 색상 등이 표기된 태그\nPrice tag attached to a product showing price, dimensions/specs, color, etc."}, {"term": "Q", "expression": "Quality", "meaning": "퀄리티\n관련 용어: Q-News, Q-Alarm, Quality report (Q report) 등\nQuality; related terms include Q-News, Q-Alarm, Quality report (Q report), etc."}, {"term": "QA", "expression": "Quality Assurance", "meaning": "상담 품질\nQuality assurance; consultation/contact quality."}, {"term": "QUANT", "expression": "Quant marketing - IKEA FAMILY Co-worker tool", "meaning": "이케아 패밀리 멤버 정보관리를 코워커 툴\nCo-worker tool for managing IKEA Family member information."}, {"term": "R&E", "expression": "Return and Exchange", "meaning": "교환환불팀\nReturn and Exchange team."}, {"term": "RFC", "expression": "Reason For Contact", "meaning": "고객이 어떤 문의로 CSC에 연락했는지 입력하는 값들\nValues/fields used to record the customer’s reason for contacting CSC."}, {"term": "RFI", "expression": "Request For Information", "meaning": "정보 요구\nRequest for information."}, {"term": "RTS", "expression": "Real Time Solution", "meaning": "CSC 업무 자동화 솔루션\nCSC work automation solution."}, {"term": "S/O", "expression": "Spare parts Out", "meaning": "예비부품/파트 발송 시의 업무 흐름(WF)\nWorkflow for sending spare parts."}, {"term": "SAC", "expression": "Sams Action Case", "meaning": "SAMS를 통해 생성된 케이스\nCase created through SAMS."}, {"term": "SÄLJA", "expression": "SÄLJA – the mobile sales co-worker tool", "meaning": "셀리아 - 고객 주문용 태블릿\nSÄLJA, a tablet/mobile sales tool for customer orders."}, {"term": "SAMS", "expression": "Service Action Management System\n(the system used by most IKEA stores for tracking customer service claims)", "meaning": "교환/반품 등의 고객 서비스를 진행시킬 수 있는 프로그램\nSystem used to process customer services such as exchanges/returns and track service claims."}, {"term": "SBF", "expression": "Service Business Fulfilment", "meaning": "-\nService Business Fulfilment."}, {"term": "SHC", "expression": "Safety and Health Committee", "meaning": "산업안전위원회\nSafety and Health Committee."}, {"term": "SISAN", "expression": "Store In Shape As New", "meaning": "고객을 만날 수 있는 상태로 늘 스토어를 정비하자\nHaving the IKEA store in shape as new every day is a basic condition for a positive meeting with visitors. Clean and in perfect condition gives our customer a good quality impression.\nKeep the store in a condition ready to meet customers. Keeping the IKEA store “in shape as new” every day is basic for positive customer meetings; a clean, perfect condition gives customers a quality impression."}, {"term": "SO", "expression": "Service Office", "meaning": "서비스 오피스\nService Office."}, {"term": "SP", "expression": "Staff Planning Team", "meaning": "(CSC 부서)\nStaff Planning team (CSC department)."}, {"term": "SP", "expression": "Service Provider", "meaning": "부가서비스 제공 업체 (IKEA 협력사)\nService provider; IKEA partner providing additional services."}, {"term": "SPARTACUS", "expression": "SPARTACUS", "meaning": "스파르타쿠스 - 부품,파트 재고 확인시스템\nSPARTACUS; spare-part/part stock checking system."}, {"term": "SPARTACUS", "expression": "SPARTACUS", "meaning": "스파르타쿠스 - 부품,파트 재고 확인시스템\nSPARTACUS; spare-part/part stock checking system."}, {"term": "SS", "expression": "Safety Stock", "meaning": "Additional stock required to compensate for forecast, sales and lead time deviations.\nStock holding required above turnover stock to increase availability during unpredictable fluctuations in lead time or sales.\nSafety stock; additional stock kept to compensate for forecast, sales, and lead-time deviations, and to increase availability during unpredictable fluctuations."}, {"term": "SSC", "expression": "SSC (AskSSC)", "meaning": "HR관련 직원 헬프라인 (080-080 4532 / askssc.kr@ikea.com)\nHR-related employee helpline."}, {"term": "SSL", "expression": "Small space living", "meaning": "작은 공간 생활\nSmall space living."}, {"term": "SSS", "expression": "Service and Sales Support Team", "meaning": "(CSC 부서)\nService and Sales Support Team (CSC department)."}, {"term": "SSS", "expression": "Sale Supply Support", "meaning": "트리플S - 재고관리 등을 하는 부서\nSSS; department in charge of stock management, etc."}, {"term": "STO", "expression": "Store Office", "meaning": "매장 오피스\nStore Office."}, {"term": "Store order", "expression": "Store order", "meaning": "스토어 오더 - 매장에서 CCD 오더를 생성하여 CDC에서 진행되는 오더\nStore order; an order created at the store as a CCD order and processed at CDC."}, {"term": "SUP NO.", "expression": "Supplier Number", "meaning": "공급자 번호\nSupplier number."}, {"term": "TBA", "expression": "To Be Announced", "meaning": "추후 공지\nTo be announced."}, {"term": "TBD", "expression": "To Be Determined(Decided)", "meaning": "추후 결정 (현재 미정)\nTo be determined/decided; currently undecided."}, {"term": "TID", "expression": "Terminal ID", "meaning": "매장 단말기 및 영수증 바코드 번호\nStore terminal ID and receipt barcode number."}, {"term": "TRO", "expression": "Time restricted offer", "meaning": "기간한정할인상품\nTime-restricted offer; limited-time discounted product."}, {"term": "TSP", "expression": "Transport", "meaning": "IKEA와 계약된 배송협력업체(운송사) 또는, CSC TSP팀\nTransport service provider contracted with IKEA, or CSC TSP team."}, {"term": "TT310", "expression": "Decoration withdrawal", "meaning": "Products taken for sales displays\n(Responsible: Communication & Interior Design)\nProducts taken for sales displays. Responsible: Communication & Interior Design."}, {"term": "TT325", "expression": "Customer returns to Recovery", "meaning": "Damaged products returned by customers\n(Responsible: Sales)\nDamaged products returned by customers. Responsible: Sales."}, {"term": "TT330", "expression": "Quality claims", "meaning": "Decreases in stock for Q-products awaiting a decision\n(Responsible: Recovery)\nStock decreases for Q-products awaiting a decision. Responsible: Recovery."}, {"term": "TT390", "expression": "Internal damages to Recovery", "meaning": "Products damaged in the store\n(Responsible: In-Store Logistics)\nProducts damaged in store. Responsible: In-Store Logistics."}, {"term": "TT391", "expression": "Received damages to Recovery", "meaning": "Products damaged on delivery\n(Responsible: In-Store Logistics)\nProducts damaged during delivery. Responsible: In-Store Logistics."}, {"term": "TT440", "expression": "Undamaged and Q-products Recovery", "meaning": "Q-products or last pieces/outgoing products handed over to Recovery\n(Responsible: Sales)\nQ-products or last pieces/outgoing products handed over to Recovery. Responsible: Sales."}, {"term": "TT441", "expression": "Inventory adjustment", "meaning": "Decreasing stock. Set products etc.\n(Responsible: Business & Operations Manager)\nStock decrease such as set products, etc. Responsible: Business & Operations Manager."}, {"term": "TT450", "expression": "Recovery to stock", "meaning": "Products recovered to stock\n(Responsible: Recovery)\nProducts returned/recovered to stock. Responsible: Recovery."}, {"term": "TT456", "expression": "Permanent inventory", "meaning": "Stock figure decreases throughout the fiscal year\n(Responsible: Business & Operations Manager)\nStock figure decreases throughout the fiscal year. Responsible: Business & Operations Manager."}, {"term": "TT457", "expression": "Annual inventory", "meaning": "Stock figure decrease after the annual inventory\n(Responsible: Business & Operations Manager)\nStock figure decrease after annual inventory. Responsible: Business & Operations Manager."}, {"term": "TW", "expression": "Time Window", "meaning": "서비스 제공 시간대\nService time window."}, {"term": "UTG", "expression": "Swedish word \"Utgående\".\nUtgående can be translated to Discontinued in English.", "meaning": "A product that will be or has been taken out of the IKEA range.\nDiscontinued = 판매 종료(단종) 제품\nSwedish word “Utgående,” translated as “Discontinued.” A product that will be or has been taken out of the IKEA range; discontinued product."}, {"term": "VOICE", "expression": "VOICE", "meaning": "직원만족도 조사\nEmployee satisfaction survey."}, {"term": "WF", "expression": "Work Flow", "meaning": "SAC을 진행하는 흐름\nWorkflow for processing SAC."}, {"term": "WFM", "expression": "Workforce Management", "meaning": "인력 매니지먼트 (스케줄 관리자)\nWorkforce management; schedule management."}, {"term": "WK", "expression": "Week", "meaning": "(달력) 주 차수\nCalendar week number."}];
    const tbody = document.getElementById('tbody');
    const form = document.getElementById('searchForm');
    const input = document.getElementById('searchInput');
    const resetBtn = document.getElementById('resetBtn');
    const statusEl = document.getElementById('status');
    const emptyEl = document.getElementById('empty');

    function escapeHtml(value) {
      return String(value ?? '')
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }

    function highlight(text, keyword) {
      const safe = escapeHtml(text);
      const q = keyword.trim();
      if (!q) return safe;
      const escaped = q.replace(/[.*+?^${}()|[\]\]/g, '\$&');
      return safe.replace(new RegExp(escaped, 'gi'), match => `<mark>${match}</mark>`);
    }

    function normalize(value) {
      return String(value ?? '').toLowerCase().replace(/\s+/g, ' ').trim();
    }

    function render(rows, keyword = '') {
      tbody.innerHTML = rows.map(row => `
        <tr>
          <td class="term-cell" data-label="약자 / 용어"><span class="term">${highlight(row.term, keyword)}</span></td>
          <td data-label="본래의 표현">${highlight(row.expression, keyword)}</td>
          <td class="meaning-cell" data-label="의미">${highlight(row.meaning, keyword)}</td>
        </tr>
      `).join('');

      const isSearching = keyword.trim().length > 0;
      statusEl.textContent = isSearching
        ? `검색 결과 ${rows.length}개 / 전체 ${glossary.length}개`
        : `전체 ${glossary.length}개 용어`;
      emptyEl.classList.toggle('show', rows.length === 0);
    }

    function search() {
      const q = input.value.trim();
      if (!q) {
        render(glossary);
        return;
      }
      const nq = normalize(q);
      const filtered = glossary.filter(row =>
        normalize(row.term).includes(nq) ||
        normalize(row.expression).includes(nq) ||
        normalize(row.meaning).includes(nq)
      );
      render(filtered, q);
    }

    form.addEventListener('submit', event => {
      event.preventDefault();
      search();
    });

    resetBtn.addEventListener('click', () => {
      input.value = '';
      render(glossary);
      input.focus();
    });

    input.addEventListener('input', () => {
      if (!input.value.trim()) render(glossary);
    });

    render(glossary);
  </script>
</body>
